set theme=($root)/boot/grub/themes/tenebraos/theme.txt
set timeout=0
set timeout_style=hidden

if [ "${grub_platform}" = "efi" ]; then
    insmod efi_gop
    insmod efi_uga
fi
insmod gfxterm
insmod gfxmenu
insmod videotest
insmod png
insmod jpeg

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm
