
title-text: "Welcome to tenebra"
desktop-color: "#000000"
desktop-image: "grub_wallpaper_2.png"

+ boot_menu {
    left   = 30%
    top    = 58%
    width  = 40%
    height = 22%
    item_font             = "DejaVu Sans Mono Regular 14"
    item_color            = "#AAAAAA"
    selected_item_color   = "#000000"
    item_height           = 36
    item_padding          = 10
    item_spacing          = 4
    scrollbar             = false
}

# ─── Countdown timer label ────────────────────────────────────────────────────

+ label {
    id    = "__timeout__"
    text  = "Boot in %d seconds"
    left  = 50%
    top   = 83%
    font  = "DejaVu Sans Mono Regular 12"
    color = "#555555"
    align = center
}

# ─── Progress bar ─────────────────────────────────────────────────────────────

+ progress_bar {
    id           = "__timeout__"
    left         = 30%
    top          = 87%
    width        = 40%
    height       = 3
    fg_color     = "#00FFFF"
    bg_color     = "#111111"
    border_color = "#222222"
}
