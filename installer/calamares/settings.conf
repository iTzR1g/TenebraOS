# installer/calamares/settings.conf
# TenebraOS - Calamares installer pipeline
# Debian 13 (Trixie)

modules-search: [ local, /usr/lib/calamares/modules, /tenebraos-src/installer/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - hardware_detect      # TenebraOS: auto-detects Mac/GPU
    - usecase_select       # TenebraOS: Gaming / Learning / Office
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - grubcfg
    - bootloader
    - autoconfig_run       # TenebraOS: post-install auto-config
    - umount
  - show:
    - finished

branding: tenebraos
prompt-install: false
dont-chroot: false
